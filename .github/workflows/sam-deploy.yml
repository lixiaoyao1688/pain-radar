name: SAM Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: sam-deploy
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # 若改用 OIDC 方式鉴权时需要

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      CORS_ORIGIN: ${{ vars.CORS_ORIGIN || 'http://localhost:3002' }}
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
      BETTER_AUTH_URL: ${{ vars.BETTER_AUTH_URL || 'http://localhost:3000' }}
      NODE_OPTIONS: --max-old-space-size=6144
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm check-types

      - name: Build server bundle
        run: pnpm --filter server build

      - name: Setup AWS SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          # 推荐改用 OIDC（免长期密钥）：删除上面两行 access key，
          # 换成 role-to-assume: arn:aws:iam::<ACCOUNT_ID>:role/<DEPLOY_ROLE>

      - name: SAM validate
        run: sam validate

      - name: SAM build
        run: sam build

      - name: SAM deploy
        run: |
          sam deploy \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --region "$AWS_REGION" \
            --parameter-overrides \
              DatabaseUrl="$DATABASE_URL" \
              CorsOrigin="$CORS_ORIGIN" \
              BetterAuthSecret="$BETTER_AUTH_SECRET" \
              BetterAuthUrl="$BETTER_AUTH_URL"
