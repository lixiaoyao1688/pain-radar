name: SAM Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: sam-deploy
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # 若改用 OIDC 方式鉴权时需要

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-1' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL_SECRET_ID: ${{ vars.DATABASE_URL_SECRET_ID || 'pain-radar/database-url' }}
      CORS_ORIGIN: ${{ vars.CORS_ORIGIN || 'http://localhost:3002' }}
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
      BETTER_AUTH_URL: ${{ vars.BETTER_AUTH_URL || 'http://localhost:3000' }}
      VPC_ID: ${{ vars.VPC_ID || 'vpc-045a9dc5c6992083c' }}
      LAMBDA_SUBNET_IDS: ${{ vars.LAMBDA_SUBNET_IDS || 'subnet-0d122b5c37cbe9c43,subnet-06d680b15888e262f' }}
      DATABASE_SECURITY_GROUP_ID: ${{ vars.DATABASE_SECURITY_GROUP_ID || 'sg-0650c5afaaf0f1dd6' }}
      NODE_OPTIONS: --max-old-space-size=6144
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm check-types

      - name: Build server bundle
        run: pnpm --filter server build

      - name: Setup AWS SAM CLI
        uses: aws-actions/setup-sam@v3
        with:
          use-installer: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          # 推荐改用 OIDC（免长期密钥）：删除上面两行 access key，
          # 换成 role-to-assume: arn:aws:iam::<ACCOUNT_ID>:role/<DEPLOY_ROLE>

      - name: Load database URL
        run: |
          raw_url="$(aws secretsmanager get-secret-value \
            --secret-id "$DATABASE_URL_SECRET_ID" \
            --region "$AWS_REGION" \
            --query SecretString \
            --output text)"

          RAW_DATABASE_URL="$raw_url" node - <<'NODE' >> "$GITHUB_ENV"
          const rawUrl = process.env.RAW_DATABASE_URL;
          if (!rawUrl) {
            throw new Error("Database URL secret is empty");
          }

          const url = new URL(rawUrl);
          url.pathname = "/pain_radar_db";
          url.searchParams.set("schema", "public");
          url.searchParams.set("sslmode", "require");

          console.log(`DEPLOY_DATABASE_URL=${url.toString()}`);
          NODE

      - name: SAM validate
        run: sam validate

      - name: SAM build
        run: sam build

      - name: SAM deploy
        run: |
          sam deploy \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --region "$AWS_REGION" \
            --parameter-overrides \
              DatabaseUrl="$DEPLOY_DATABASE_URL" \
              CorsOrigin="$CORS_ORIGIN" \
              BetterAuthSecret="$BETTER_AUTH_SECRET" \
              BetterAuthUrl="$BETTER_AUTH_URL" \
              NodeEnv="production" \
              VpcId="$VPC_ID" \
              LambdaSubnetIds="$LAMBDA_SUBNET_IDS" \
              DatabaseSecurityGroupId="$DATABASE_SECURITY_GROUP_ID"
