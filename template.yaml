AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: PainRadar server (Hono + tRPC + better-auth) on Lambda + API Gateway

Parameters:
  DatabaseUrl:
    Type: String
    NoEcho: true
    Default: postgresql://user:pass@localhost:5432/painradar # 占位值，部署时通过 GitHub Secrets 覆盖
  CorsOrigin:
    Type: String
    Default: http://localhost:3002
  BetterAuthSecret:
    Type: String
    NoEcho: true
    Default: placeholder-better-auth-secret
  BetterAuthUrl:
    Type: String
    Default: http://localhost:3000
  VpcId:
    Type: AWS::EC2::VPC::Id
    Default: vpc-045a9dc5c6992083c
  LambdaSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Default: subnet-0d122b5c37cbe9c43,subnet-06d680b15888e262f
  DatabaseSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Default: sg-0650c5afaaf0f1dd6

Globals:
  Function:
    Runtime: nodejs22.x
    Timeout: 30
    MemorySize: 512
    Architectures:
      - arm64

Resources:
  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow PainRadar Lambda to reach the database
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  DatabaseIngressFromLambda:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      Description: Allow PostgreSQL traffic from PainRadar Lambda
      GroupId: !Ref DatabaseSecurityGroupId
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      SourceSecurityGroupId: !Ref LambdaSecurityGroup

  ServerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: lambda.handler
      CodeUri: apps/server
      Policies:
        - AWSLambdaVPCAccessExecutionRole
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
        SubnetIds: !Ref LambdaSubnetIds
      Environment:
        Variables:
          DATABASE_URL: !Ref DatabaseUrl
          CORS_ORIGIN: !Ref CorsOrigin
          BETTER_AUTH_SECRET: !Ref BetterAuthSecret
          BETTER_AUTH_URL: !Ref BetterAuthUrl
      Events:
        Root:
          Type: HttpApi
          Properties:
            Path: /
            Method: ANY
        Proxy:
          Type: HttpApi
          Properties:
            Path: /{proxy+}
            Method: ANY
    Metadata:
      BuildMethod: makefile

Outputs:
  ApiUrl:
    Description: API Gateway endpoint
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com/"
