[mcp_servers.better-t-stack]
command = "pnpm"
args = ["dlx", "create-better-t-stack@latest", "mcp"]

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]

[mcp_servers.shadcn]
command = "npx"
args = ["-y", "shadcn@latest", "mcp"]

[mcp_servers.better-auth]
type = "http"
url = "https://mcp.inkeep.com/better-auth/mcp"

[mcp_servers.stitch]
url = "https://stitch.googleapis.com/mcp"

[mcp_servers.stitch.http_headers]
"X-Goog-Api-Key" = "${STITCH_API_KEY}"

[mcp_servers.aws-api]
command = "uvx"
args = ["awslabs.aws-api-mcp-server@latest"]
env = { AWS_PROFILE = "AdministratorAccess-148286034169", AWS_REGION = "ap-northeast-1" }
